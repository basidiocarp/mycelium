name: Performance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    uses: basidiocarp/.github/.github/workflows/rust-performance.yml@ac464bbd159bc15d40a4d496c44c1a8d77e3d50f
    with:
      binary: mycelium
      max-size-mb: 12
      max-startup-ms: 15
