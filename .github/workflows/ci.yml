name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  ci:
    uses: basidiocarp/.github/.github/workflows/rust-ci.yml@main
    with:
      workspace: false
      no-default-features: true
      audit: true

  integration:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install --path . --locked
      - run: cargo test --ignored
