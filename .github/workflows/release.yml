name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  actions: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (aarch64-linux)
        if: matrix.cross
        uses: taiki-e/install-action@v2.69.7
        with:
          tool: cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../mycelium-${{ matrix.target }}.tar.gz mycelium
        shell: bash

      - name: Package (windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../mycelium-${{ matrix.target }}.zip mycelium.exe
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: mycelium-${{ matrix.target }}
          path: mycelium-${{ matrix.target }}.${{ matrix.archive }}

  packages:
    name: Linux packages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download linux x86_64 build
        uses: actions/download-artifact@v8.0.1
        with:
          name: mycelium-x86_64-unknown-linux-musl
          path: artifacts

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Install packaging tools
        uses: taiki-e/install-action@v2.69.7
        with:
          tool: cargo-deb,cargo-generate-rpm

      - name: Build DEB
        run: cargo deb --no-build

      - name: Build RPM
        run: cargo generate-rpm

      - name: Upload DEB
        uses: actions/upload-artifact@v7.0.0
        with:
          name: mycelium-deb
          path: target/debian/*.deb

      - name: Upload RPM
        uses: actions/upload-artifact@v7.0.0
        with:
          name: mycelium-rpm
          path: target/generate-rpm/*.rpm

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [build, packages]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.deb' -o -name '*.rpm' \) -exec cp {} release/ \;
          cd release && sha256sum ./* > SHA256SUMS

      - name: Extract release notes from tag
        id: notes
        run: |
          # Get the annotated tag message (skip the first line which is "Release vX.Y.Z")
          NOTES=$(git tag -l --format='%(contents:body)' "${{ github.ref_name }}")
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to file to preserve multiline formatting
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.0
        with:
          body_path: /tmp/release-notes.md
          files: release/*
